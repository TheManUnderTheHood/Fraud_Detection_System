spring.application.name=Transaction

Server.port=8080

# ===============================
# DATABASE CONFIGURATION (MySQL)
# ===============================
# The JDBC URL to connect to MySQL.
# "fraud_db" is the database name.
# "createDatabaseIfNotExist=true" forces MySQL to create the DB if it's missing, saving you a manual step!
spring.datasource.url=
# The username used to log in to your MySQL server.
spring.datasource.username=

# The password used to log in to your MySQL server. (Make sure this matches your local MySQL setup).
spring.datasource.password=

# Specifies the exact Java class (driver) used to communicate with MySQL.
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA & HIBERNATE CONFIGURATION
# =============================== 
# ddl-auto=update tells Hibernate to look at our Java classes (Entities) and automatically create or update the corresponding tables in MySQL.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true makes Spring print the actual SQL queries (SELECT, INSERT) to your console. Great for learning and debugging!
spring.jpa.show-sql=true

# format_sql=true formats those printed SQL queries across multiple lines so they are easy for a human to read.
spring.jpa.properties.hibernate.format_sql=true

# dialect tells Hibernate which specific database we are using so it writes the correct "flavor" of SQL.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect


app.jwt.secret=404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
app.jwt.expiration=86400000

# ===============================
# AI AGENT CONFIGURATION (OpenRouter via OpenAI-compatible API)
# ===============================
spring.ai.openai.base-url=https://openrouter.ai/api
spring.ai.openai.api-key=${OPENROUTER_API_KEY:}
spring.ai.openai.chat.options.model=${OPENROUTER_MODEL:openai/gpt-4o-mini}
spring.ai.openai.chat.options.temperature=0.1